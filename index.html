<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Finanças Mensais</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ==== SEU CSS ORIGINAL MANTIDO ==== */
/* (mantive o essencial para não estourar limite aqui,
   você pode colar o seu CSS inteiro aqui sem alterar nada) */
body{margin:0;background:#0b1220;color:#e8eefc;font-family:sans-serif}
.btn{padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:#1a2944;color:#fff;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="
position:fixed;inset:0;background:#0b1220;
display:flex;align-items:center;justify-content:center;z-index:999;
">
<div style="background:#111f36;padding:30px;border-radius:20px;width:320px;display:flex;flex-direction:column;gap:20px;align-items:center;">
<h3>Controle de Finanças</h3>

<button id="btnGoogle" style="
background:white;
color:black;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
font-weight:600;
">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
Entrar com Google
</button>

</div>
</div>

<div id="app" style="display:none;padding:20px;">
<h2>Resumo</h2>

<div>
<button class="btn" onclick="logout()">🚪 Sair</button>
</div>

<hr>

<h3>Receitas</h3>
<input id="incName" placeholder="Nome">
<input id="incValue" type="number" placeholder="Valor">
<button id="btnAddIncome" class="btn">Adicionar</button>

<h3>Despesas</h3>
<input id="expName" placeholder="Nome">
<input id="expValue" type="number" placeholder="Valor">
<button id="btnAddExpense" class="btn">Adicionar</button>

<hr>

<h3>KPIs</h3>
<p>Receitas: <span id="kpiReceitas">R$ 0,00</span></p>
<p>Despesas: <span id="kpiDespesas">R$ 0,00</span></p>
<p>Saldo: <span id="kpiSaldo">R$ 0,00</span></p>

<hr>

<h3>Gráfico Acumulado</h3>
<canvas id="financeChart" height="120"></canvas>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCr_6mww70fRdSRXVgApPSgDMs1myRLRSg",
  authDomain: "financasmensaispaulods.firebaseapp.com",
  projectId: "financasmensaispaulods",
  storageBucket: "financasmensaispaulods.firebasestorage.app",
  messagingSenderId: "168499253940",
  appId: "1:168499253940:web:8d14795ad8195858283de1"
};


const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

enableIndexedDbPersistence(db).catch(()=>{});

const provider = new GoogleAuthProvider();

/* ================= ESTADO ================= */

const fmt = n => (Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const uid = () => Math.random().toString(36).slice(2,10);

let state = {
  selected: {
    month: new Date().getMonth(),
    year: new Date().getFullYear()
  },
  data: {}
};

function keyMY(m,y){
  return `${y}-${String(m+1).padStart(2,"0")}`;
}

function ensureBucket(m=state.selected.month,y=state.selected.year){
  const k=keyMY(m,y);
  if(!state.data[k]) state.data[k]={incomes:[],expenses:[]};
  return state.data[k];
}

/* ================= FIRESTORE ================= */

async function save(){
  const user = auth.currentUser;
  await setDoc(doc(db,"users",user.uid),{finances:state});
}

async function load(){
  const user = auth.currentUser;
  const snap = await getDoc(doc(db,"users",user.uid));
  if(snap.exists()){
    state = snap.data().finances;
  }
}

/* ================= GRÁFICO ACUMULADO ================= */

let chart;

function createChart(){
  const ctx = document.getElementById("financeChart");
  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:[],
      datasets:[{
        label:"Saldo Acumulado",
        data:[],
        borderWidth:2,
        tension:.3
      }]
    },
    options:{
      responsive:true
    }
  });
}

function updateChart(){
  let acumulado = 0;
  const labels = [];
  const valores = [];

  Object.keys(state.data).sort().forEach(k=>{
    const b = state.data[k];
    const totalInc = b.incomes.reduce((a,b)=>a+b.value,0);
    const totalExp = b.expenses.reduce((a,b)=>a+b.value,0);
    acumulado += (totalInc-totalExp);
    labels.push(k);
    valores.push(acumulado);
  });

  chart.data.labels = labels;
  chart.data.datasets[0].data = valores;
  chart.update();
}

/* ================= RENDER ================= */

function render(){
  const bucket = ensureBucket();

  const totalInc = bucket.incomes.reduce((a,b)=>a+b.value,0);
  const totalExp = bucket.expenses.reduce((a,b)=>a+b.value,0);

  document.getElementById("kpiReceitas").textContent = fmt(totalInc);
  document.getElementById("kpiDespesas").textContent = fmt(totalExp);
  document.getElementById("kpiSaldo").textContent = fmt(totalInc-totalExp);

  updateChart();
}

/* ================= BOTÕES ================= */

document.getElementById("btnAddIncome").onclick = async ()=>{
  const bucket = ensureBucket();
  const name = document.getElementById("incName").value || "Receita";
  const value = Number(document.getElementById("incValue").value);

  if(!value) return;

  bucket.incomes.push({id:uid(),name,value});
  document.getElementById("incName").value="";
  document.getElementById("incValue").value="";

  await save();
  render();
};

document.getElementById("btnAddExpense").onclick = async ()=>{
  const bucket = ensureBucket();
  const name = document.getElementById("expName").value || "Despesa";
  const value = Number(document.getElementById("expValue").value);

  if(!value) return;

  bucket.expenses.push({id:uid(),name,value,paid:false});
  document.getElementById("expName").value="";
  document.getElementById("expValue").value="";

  await save();
  render();
};

/* ================= LOGIN GOOGLE ================= */

document.getElementById("btnGoogle").onclick = async ()=>{
  try{
    await signInWithPopup(auth, provider);
  }catch(e){
    alert("Erro ao logar");
  }
};

window.logout = ()=>signOut(auth);

/* ================= CONTROLE DE SESSÃO ================= */

onAuthStateChanged(auth, async user=>{
  if(user){

    // cria usuário se não existir
    await setDoc(doc(db,"users",user.uid),{
      email:user.email,
      name:user.displayName,
      photo:user.photoURL
    },{merge:true});

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";

    await load();

    if(!chart) createChart();
    render();

  }else{
    document.getElementById("loginScreen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

</script>

</body>
</html>
