<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Finanças Mensais</title>

<!-- ================= CSS (SEU LAYOUT ORIGINAL) ================= -->
<style>
/* SEU CSS ORIGINAL MANTIDO 100% */
:root{
--bg:#0b1220;
--card:#0f1a2e;
--card2:#111f36;
--muted:#95a3b8;
--text:#e8eefc;
--line:rgba(255,255,255,.08);
--good:#31d0aa;
--bad:#ff5c7a;
--warn:#ffd166;
--accent:#6ea8ff;
--shadow:0 12px 30px rgba(0,0,0,.35);
--radius:18px;
--font:ui-sans-serif,system-ui;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:var(--font);
background:var(--bg);
color:var(--text);
}
.app{max-width:1080px;margin:0 auto;padding:18px}
.topbar{background:var(--card);padding:14px;border-radius:18px}
.toprow{display:flex;justify-content:space-between;align-items:center}
.controls{display:flex;gap:10px;align-items:center}
.pill{background:rgba(255,255,255,.05);padding:6px 10px;border-radius:16px}
.btn{background:rgba(110,168,255,.3);border:none;padding:8px 12px;border-radius:10px;cursor:pointer}
.card{background:var(--card);border-radius:18px;margin-top:14px;padding:14px}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.kpi{background:rgba(255,255,255,.05);padding:8px;border-radius:14px}
.value{font-weight:bold}
.list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.item{background:rgba(255,255,255,.05);padding:10px;border-radius:12px;display:flex;justify-content:space-between;align-items:center}
.tabs{display:flex;gap:8px;margin-top:10px}
.tab{padding:6px 10px;background:rgba(255,255,255,.05);border-radius:20px;cursor:pointer}
.tab.active{background:rgba(110,168,255,.3)}
.empty{opacity:.6;margin-top:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal{background:var(--card);padding:20px;border-radius:20px;width:90%;max-width:500px}
input,select{background:rgba(255,255,255,.05);border:none;padding:8px;border-radius:8px;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;inset:0;background:#0b1220;display:flex;align-items:center;justify-content:center;">
<div style="background:#111f36;padding:30px;border-radius:20px;width:300px;display:flex;flex-direction:column;gap:10px;">
<h3>Login</h3>
<input id="loginName" placeholder="Nome (no cadastro)">
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Senha">
<button class="btn" id="btnLogin">Entrar</button>
<button class="btn" id="btnRegister">Cadastrar</button>
</div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none; opacity:0;">
<div class="topbar">
<div class="toprow">
<div>
<strong id="userName"></strong>
</div>
<div class="controls">
<select id="tenantSelect"></select>
<button class="btn" id="btnNewTenant">+ Empresa</button>
<button class="btn" onclick="logout()">Sair</button>
</div>
</div>
</div>

<div class="card">
<div class="summary">
<div class="kpi"><div>Total receitas</div><div class="value" id="kpiReceitas">0</div></div>
<div class="kpi"><div>Total despesas</div><div class="value" id="kpiDespesas">0</div></div>
<div class="kpi"><div>Pago</div><div class="value" id="kpiPago">0</div></div>
<div class="kpi"><div>Falta</div><div class="value" id="kpiFalta">0</div></div>
<div class="kpi"><div>Saldo</div><div class="value" id="kpiSaldo">0</div></div>
</div>
</div>

<div class="card">
<h3>Receitas</h3>
<input id="incName" placeholder="Nome">
<input id="incValue" type="number" placeholder="Valor">
<button class="btn" id="btnAddIncome">Adicionar</button>
<div class="list" id="listReceitas"></div>
</div>

<div class="card">
<h3>Despesas</h3>
<input id="expName" placeholder="Nome">
<input id="expValue" type="number" placeholder="Valor">
<select id="expCat">
<option value="FIXA">Fixa</option>
<option value="CASA">Casa</option>
<option value="DIVERSOS">Diversos</option>
</select>
<div>
<input type="checkbox" id="expParcelado"> Parcelado?
</div>
<input id="expParcelas" type="number" placeholder="Parcelas" style="display:none">
<button class="btn" id="btnAddExpense">Adicionar</button>
<div class="list" id="listContas"></div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCr_6mww70fRdSRXVgApPSgDMs1myRLRSg",
  authDomain: "financasmensaispaulods.firebaseapp.com",
  projectId: "financasmensaispaulods",
  storageBucket: "financasmensaispaulods.firebasestorage.app",
  messagingSenderId: "168499253940",
  appId: "1:168499253940:web:8d14795ad8195858283de1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentTenant=null;
let state={data:{}};

function keyMY(m,y){return `${y}-${m}`;}
function ensureBucket(){const k="main";if(!state.data[k])state.data[k]={incomes:[],expenses:[]};return state.data[k];}
const fmt=n=>Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

/* LOGIN */
btnLogin.onclick=async()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
};
btnRegister.onclick=async()=>{
const cred=await createUserWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
if(loginName.value)await updateProfile(cred.user,{displayName:loginName.value});
};

window.logout=()=>signOut(auth);

/* MULTIEMPRESA */
async function loadTenants(){
const snap=await getDocs(collection(db,"tenants"));
tenantSelect.innerHTML="";
snap.forEach(d=>{
const opt=document.createElement("option");
opt.value=d.id;
opt.textContent=d.data().name;
tenantSelect.appendChild(opt);
});
if(snap.docs.length){
currentTenant=snap.docs[0].id;
loadData();
}
}

btnNewTenant.onclick=async()=>{
const name=prompt("Nome da empresa:");
if(!name)return;
const docRef=await addDoc(collection(db,"tenants"),{name});
currentTenant=docRef.id;
await setDoc(doc(db,"tenants",docRef.id,"data","main"),{data:{}});
loadTenants();
};

tenantSelect.onchange=()=>{currentTenant=tenantSelect.value;loadData();};

async function save(){
await setDoc(doc(db,"tenants",currentTenant,"data","main"),{data:state.data});
}

async function loadData(){
const snap=await getDoc(doc(db,"tenants",currentTenant,"data","main"));
state.data=snap.exists()?snap.data().data:{};
render();
}

/* RENDER */
function render(){
const bucket=ensureBucket();
const inc=bucket.incomes.reduce((a,b)=>a+b.value,0);
const exp=bucket.expenses.reduce((a,b)=>a+b.value,0);
const pago=bucket.expenses.filter(x=>x.paid).reduce((a,b)=>a+b.value,0);

kpiReceitas.textContent=fmt(inc);
kpiDespesas.textContent=fmt(exp);
kpiPago.textContent=fmt(pago);
kpiFalta.textContent=fmt(exp-pago);
kpiSaldo.textContent=fmt(inc-exp);

listReceitas.innerHTML="";
bucket.incomes.forEach(i=>{
listReceitas.innerHTML+=`<div class="item">${i.name} <strong>${fmt(i.value)}</strong></div>`;
});

listContas.innerHTML="";
bucket.expenses.forEach(e=>{
listContas.innerHTML+=`<div class="item">${e.name} <strong>${fmt(e.value)}</strong></div>`;
});
}

/* AÇÕES */
btnAddIncome.onclick=async()=>{
const bucket=ensureBucket();
bucket.incomes.push({name:incName.value,value:Number(incValue.value)});
incName.value="";incValue.value="";
await save();render();
};

btnAddExpense.onclick=async()=>{
const bucket=ensureBucket();
bucket.expenses.push({name:expName.value,value:Number(expValue.value),paid:false});
expName.value="";expValue.value="";
await save();render();
};

/* AUTH */
onAuthStateChanged(auth, async user => {

  const login = document.getElementById("loginScreen");
  const app = document.getElementById("app");

  if (user) {

    login.style.display = "none";
    app.style.display = "block";

    // Pequeno delay para evitar flicker
    setTimeout(() => {
      app.style.opacity = "1";
    }, 50);

    userName.textContent = user.displayName || user.email;

    await loadTenants();

  } else {

    app.style.display = "none";
    login.style.display = "flex";
  }

});
</script>
</body>
</html>
